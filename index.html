  const API_BASE = "https://jobradar-backend-2.onrender.com";

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', TAB_NAMES[i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach((p, i) => {
      p.classList.toggle('active', TAB_IDS[i] === 'tab-' + name);
    });
  }

  function addTag(e, wrapperId) {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();

    const input = e.target;
    const val = input.value.trim().toLowerCase();
    if (!val) return;

    const existing = getTags(wrapperId);
    if (existing.includes(val)) {
      input.value = '';
      return;
    }

    const wrap = document.getElementById(wrapperId);
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${escapeHtml(val)} <button type="button" onclick="removeTag(this)">×</button>`;
    wrap.insertBefore(tag, input);
    input.value = '';

    refreshResults();
  }

  function removeTag(btn) {
    btn.closest('.tag').remove();
    refreshResults();
  }

  function toggleFaq(btn) {
    btn.closest('.faq-item').classList.toggle('open');
  }

  function scoreColor(s) {
    if (s >= 80) return '#b8ff57';
    if (s >= 60) return '#ffd57e';
    return '#ff8c7e';
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function normalizeText(value) {
    return String(value || '').trim();
  }

  function normalizeLower(value) {
    return normalizeText(value).toLowerCase();
  }

  function tokenize(text) {
    return normalizeLower(text)
      .replace(/[^a-z0-9\s]/g, ' ')
      .split(/\s+/)
      .filter(token => token.length > 2);
  }

  function getTags(wrapperId) {
    return Array.from(document.querySelectorAll(`#${wrapperId} .tag`))
      .map(tag => tag.textContent.replace('×', '').trim().toLowerCase())
      .filter(Boolean);
  }

  function getSelectedSources() {
    return Array.from(document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked'))
      .map(input => input.value);
  }

  function getUserConfig() {
    const keywords = getTags('keywords-wrap');

    return {
      filters: {
        keywords: keywords.length ? keywords : DEFAULT_BUSINESS_KEYWORDS,
        exclude: getTags('exclude-wrap'),
        locations: getTags('location-wrap'),
        companies: getTags('company-wrap'),
        sources: getSelectedSources()
      },
      weights: {
        keywords: Number(document.getElementById('weight-keywords')?.value || 40),
        location: Number(document.getElementById('weight-location')?.value || 20),
        company: Number(document.getElementById('weight-company')?.value || 15),
        semantic: Number(document.getElementById('weight-semantic')?.value || 25)
      },
      display: {
        min_score: Number(document.getElementById('score-range')?.value || 35),
        limit: Number(document.getElementById('max-range')?.value || 50)
      }
    };
  }

  function normalizeJob(job) {
    const breakdown = job.score_breakdown || {};
    const finalScore = Number(breakdown.final ?? job.score ?? 0);

    return {
      company: normalizeText(job.company),
      position: normalizeText(job.position),
      location: normalizeText(job.location),
      link: normalizeText(job.link),
      source: normalizeText(job.source),
      description: normalizeText(job.description),
      score_breakdown: {
        keywords: Number(breakdown.keywords || 0),
        location: Number(breakdown.location || 0),
        company: Number(breakdown.company || 0),
        semantic: Number(breakdown.semantic || 0),
        final: finalScore
      }
    };
  }

  function expandKeywords(keywords) {
    const expanded = new Set();

    (keywords || []).forEach(keyword => {
      const normalized = normalizeLower(keyword);
      if (!normalized) return;

      expanded.add(normalized);

      Object.entries(ROLE_FAMILIES).forEach(([family, terms]) => {
        if (normalized === family || terms.includes(normalized)) {
          terms.forEach(term => expanded.add(term));
        }
      });
    });

    return [...expanded];
  }

  function jobBlob(job) {
    return normalizeLower([
      job.company,
      job.position,
      job.location,
      job.description
    ].join(' '));
  }

  function jobMatchesFilters(job, filters) {
    const blob = jobBlob(job);

    if (filters.sources.length && !filters.sources.includes(job.source)) {
      return false;
    }

    if (filters.exclude.some(term => blob.includes(term))) {
      return false;
    }

    return true;
  }

  function computeKeywordScore(job, keywords) {
    const expanded = expandKeywords(keywords);
    if (!expanded.length) return 0;

    const title = normalizeLower(job.position);
    const description = normalizeLower(job.description);

    let points = 0;

    expanded.forEach(term => {
      if (title.includes(term)) {
        points += 2;
      } else if (description.includes(term)) {
        points += 1;
      }
    });

    return Math.min(100, Math.round((points / (expanded.length * 2)) * 100));
  }

  function computeLocationScore(job, locations) {
    if (!locations.length) return 0;

    const jobLocation = normalizeLower(job.location);
    let best = 0;

    locations.forEach(location => {
      const loc = normalizeLower(location);

      if (loc === jobLocation) best = Math.max(best, 100);
      else if (jobLocation.includes(loc)) best = Math.max(best, 80);
      else if (loc === 'remote' && jobLocation.includes('remote')) best = Math.max(best, 90);
    });

    return best;
  }

  function computeCompanyScore(job, companies) {
    if (!companies.length) return 0;

    const company = normalizeLower(job.company);

    for (const target of companies) {
      const normalizedTarget = normalizeLower(target);
      if (company === normalizedTarget) return 100;
      if (company.includes(normalizedTarget)) return 70;
    }

    return 0;
  }

  function computeSemanticScore(job, keywords) {
    const profileText = document.getElementById('ideal-profile')?.value || '';
    const referenceTokens = new Set([
      ...tokenize(expandKeywords(keywords).join(' ')),
      ...tokenize(profileText)
    ]);

    if (!referenceTokens.size) return 0;

    const jobTokens = new Set(tokenize([
      job.position,
      job.description,
      job.company
    ].join(' ')));

    if (!jobTokens.size) return 0;

    let overlap = 0;
    referenceTokens.forEach(token => {
      if (jobTokens.has(token)) overlap += 1;
    });

    const denominator = Math.max(6, Math.floor(referenceTokens.size * 0.35));
    return Math.min(100, Math.round((overlap / denominator) * 100));
  }

  function computeFinalScore(job, filters, weights) {
    const keywordScore = computeKeywordScore(job, filters.keywords);
    const locationScore = computeLocationScore(job, filters.locations);
    const companyScore = computeCompanyScore(job, filters.companies);
    const semanticScore = computeSemanticScore(job, filters.keywords);

    const wk = Number(weights.keywords || 0);
    const wl = Number(weights.location || 0);
    const wc = Number(weights.company || 0);
    const ws = Number(weights.semantic || 0);

    const totalWeight = Math.max(1, wk + wl + wc + ws);

    const final = (
      keywordScore * wk +
      locationScore * wl +
      companyScore * wc +
      semanticScore * ws
    ) / totalWeight;

    return {
      keywords: keywordScore,
      location: locationScore,
      company: companyScore,
      semantic: semanticScore,
      final: Math.round(final)
    };
  }

  function applyClientFiltering(jobs, config) {
    return jobs
      .map(normalizeJob)
      .filter(job => jobMatchesFilters(job, config.filters))
      .map(job => ({
        ...job,
        score_breakdown: computeFinalScore(job, config.filters, config.weights)
      }))
      .filter(job => job.score_breakdown.final >= config.display.min_score)
      .sort((a, b) => b.score_breakdown.final - a.score_breakdown.final)
      .slice(0, config.display.limit);
  }

  function renderJobs(jobs, totalCount) {
    const container = document.getElementById('results-content');

    if (!totalCount) {
      container.innerHTML = `
        <div class="results-empty">
          <span class="empty-icon">🔍</span>
          <p>Lancez un scan depuis l'onglet Configuration pour voir les résultats ici.</p>
        </div>
      `;
      return;
    }

    if (!jobs.length) {
      container.innerHTML = `
        <div class="results-empty">
          <span class="empty-icon">📭</span>
          <p>Aucune offre ne correspond aux filtres actuels.</p>
          <p style="margin-top:0.5rem;font-size:0.85rem;">${totalCount} offres ont bien été collectées, mais aucune n'est visible avec ce score minimum et ces critères.</p>
        </div>
      `;
      return;
    }

    let html = `
      <p class="status-msg" style="color:var(--accent);margin-bottom:0.5rem">
        ✅ ${jobs.length} offres visibles sur ${totalCount} collectées
      </p>
    `;

    jobs.forEach(job => {
      const score = Number(job.score_breakdown?.final || 0);
      const href = job.link || '#';

      html += `
        <a class="job-card" href="${escapeHtml(href)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit;">
          <div class="job-logo">💼</div>
          <div class="job-info">
            <div class="job-title">${escapeHtml(job.position || 'Sans titre')}</div>
            <div class="job-company">${escapeHtml(job.company || 'Entreprise inconnue')}</div>
            <div class="job-meta">
              <span class="job-tag">📍 ${escapeHtml(job.location || 'N/A')}</span>
              <span class="job-tag">🔗 ${escapeHtml(job.source || 'Source inconnue')}</span>
              <span class="job-tag">KW ${job.score_breakdown.keywords}</span>
              <span class="job-tag">LOC ${job.score_breakdown.location}</span>
              <span class="job-tag">ENT ${job.score_breakdown.company}</span>
              <span class="job-tag">SEM ${job.score_breakdown.semantic}</span>
            </div>
            ${job.description ? `<div style="font-size:0.82rem;color:var(--muted);margin-top:0.75rem;">${escapeHtml(job.description.slice(0, 220))}${job.description.length > 220 ? '…' : ''}</div>` : ''}
          </div>
          <div class="job-score" style="color:${scoreColor(score)}">
            ${score}
            <span class="score-label">score</span>
          </div>
        </a>
      `;
    });

    container.innerHTML = html;
  }

  function refreshResults() {
    if (!allJobs.length) return;
    const config = getUserConfig();
    const visibleJobs = applyClientFiltering(allJobs, config);
    renderJobs(visibleJobs, allJobs.length);
  }

  async function runRealScan() {
    const btn = document.getElementById('run-btn');
    const label = document.getElementById('run-label');
    const container = document.getElementById('results-content');
    const config = getUserConfig();

    btn.disabled = true;
    label.textContent = '⏳ Lancement du scan…';

    switchTab('results');

    container.innerHTML = `
      <p class="status-msg" id="status-msg">Connexion au backend…</p>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    `;

    try {
      const res = await fetch(`${API_BASE}/scan`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sources: config.filters.sources,
          min_score: config.display.min_score,
          max_jobs: config.display.limit
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Impossible de lancer le scan');
      }

      label.textContent = '⏳ Scan en cours…';
      pollScanStatus();
    } catch (e) {
      container.innerHTML = `
        <div class="results-empty">
          <span class="empty-icon">❌</span>
          <p>Erreur : ${escapeHtml(e.message)}</p>
        </div>
      `;
      btn.disabled = false;
      label.textContent = '🚀 Lancer le scan';
    }
  }

  function pollScanStatus() {
    const btn = document.getElementById('run-btn');
    const label = document.getElementById('run-label');
    const container = document.getElementById('results-content');

    if (pollTimer) clearInterval(pollTimer);

    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();

        const statusMsg = document.getElementById('status-msg');
        const progressFill = document.getElementById('progress-fill');

        if (statusMsg) statusMsg.textContent = data.status || 'Scan en cours…';
        if (progressFill) progressFill.style.width = `${data.progress || 0}%`;

        if (!data.running) {
          clearInterval(pollTimer);
          pollTimer = null;
          await loadRealJobs();
          btn.disabled = false;
          label.textContent = '🚀 Lancer le scan';
        }
      } catch (e) {
        clearInterval(pollTimer);
        pollTimer = null;
        container.innerHTML = `
          <div class="results-empty">
            <span class="empty-icon">❌</span>
            <p>Erreur pendant le suivi du scan : ${escapeHtml(e.message)}</p>
          </div>
        `;
        btn.disabled = false;
        label.textContent = '🚀 Lancer le scan';
      }
    }, 2000);
  }

  async function loadRealJobs() {
    const container = document.getElementById('results-content');

    try {
      const res = await fetch(`${API_BASE}/jobs`);
      const data = await res.json();

      allJobs = Array.isArray(data.jobs) ? data.jobs.map(normalizeJob) : [];
      refreshResults();
    } catch (e) {
      container.innerHTML = `
        <div class="results-empty">
          <span class="empty-icon">❌</span>
          <p>Impossible de charger les offres : ${escapeHtml(e.message)}</p>
        </div>
      `;
    }
  }

  function bindLiveFilters() {
    [
      'score-range',
      'max-range',
      'weight-keywords',
      'weight-location',
      'weight-company',
      'weight-semantic',
      'ideal-profile'
    ].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', refreshResults);
    });

    document.querySelectorAll('.checkbox-group input[type="checkbox"]').forEach(input => {
      input.addEventListener('change', refreshResults);
    });

    loadRealJobs().catch(() => {});
  }

  document.addEventListener('DOMContentLoaded', bindLiveFilters);

  async function testApiKey() {
    const key = document.getElementById('anthropic-key').value.trim();
    const status = document.getElementById('api-status');

    if (!key) {
      status.textContent = '⚠️ Entrez une clé API.';
      status.style.color = '#ffd57e';
      return;
    }

    status.textContent = '⏳ Test en cours…';
    status.style.color = 'var(--muted)';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'Hi' }]
        })
      });

      if (res.ok) {
        status.textContent = '✅ Clé valide — connexion réussie !';
        status.style.color = '#b8ff57';
      } else {
        status.textContent = '❌ Clé invalide ou expirée.';
        status.style.color = '#ff8c7e';
      }
    } catch (e) {
      status.textContent = '❌ Erreur réseau : ' + e.message;
      status.style.color = '#ff8c7e';
    }
  }

  async function analyzeJobWithAI() {
    const key = document.getElementById('anthropic-key').value.trim();
    const profile = document.getElementById('ideal-profile').value.trim();
    const title = document.getElementById('test-job-title').value.trim();
    const company = document.getElementById('test-job-company').value.trim();
    const output = document.getElementById('ai-output');
    const btnLabel = document.getElementById('ai-btn-label');

    if (!profile) {
      alert("Décrivez d'abord votre profil idéal dans le champ ci-dessus.");
      return;
    }
    if (!title) {
      alert("Entrez un titre de poste à analyser.");
      return;
    }

    output.classList.add('visible');
    output.innerHTML = '<span style="color:var(--muted)">Analyse en cours<span class="cursor-blink">▌</span></span>';
    btnLabel.textContent = '⏳ Analyse…';

    const systemPrompt = `Tu es un expert en recrutement et analyse de compatibilité candidat/offre. 
Tu dois analyser si une offre d'emploi correspond au profil idéal d'un candidat en utilisant la similarité sémantique.
Réponds en français, de façon concise et structurée.`;

    const userPrompt = `Profil idéal du candidat :
"${profile}"

Offre à analyser :
Titre : ${title}${company ? `\nEntreprise : ${company}` : ''}

Analyse en 3 points :
1. Score de similarité sémantique (0-100) et justification en 1 phrase
2. Pourquoi ce rôle est (ou n'est pas) pertinent en 2-3 phrases
3. Verdict : ✅ À postuler / ⚠️ À considérer / ❌ Hors profil`;

    if (!key) {
      await simulateStreaming(output, getDemoAnalysis(title));
      btnLabel.textContent = '✨ Analyser la similarité avec mon profil';
      return;
    }

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-beta': 'messages-2023-12-15'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 400,
          stream: true,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      output.innerHTML = '';
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') continue;

          try {
            const evt = JSON.parse(data);
            if (evt.type === 'content_block_delta' && evt.delta?.text) {
              output.innerHTML += evt.delta.text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text)">$1</strong>');
              output.scrollTop = output.scrollHeight;
            }
          } catch (e) {}
        }
      }
    } catch (e) {
      output.innerHTML = `<span style="color:#ff8c7e">Erreur : ${escapeHtml(e.message)}. Vérifiez votre clé API et réessayez.</span>`;
    }

    btnLabel.textContent = '✨ Analyser la similarité avec mon profil';
  }

  function getDemoAnalysis(title) {
    return `**Score de similarité sémantique : 78/100**
Ce rôle partage une forte proximité sémantique avec un profil business au sens large.

**Pourquoi ce rôle est pertinent**
"${title}" peut couvrir des responsabilités proches de la vente, des partenariats, de la croissance, des opérations ou de la relation client. Même si le titre exact diffère, la nature du poste peut rester très compatible avec un périmètre business.

**Verdict : ✅ À considérer**
Le titre ne doit pas être le seul critère.

<span style="color:var(--muted);font-size:0.75rem;font-style:italic">Mode démo — ajoutez votre clé API Anthropic pour une analyse réelle en streaming.</span>`;
  }

  async function simulateStreaming(output, text) {
    output.innerHTML = '';
    const words = text.split(' ');

    for (const word of words) {
      output.innerHTML += word + ' ';
      output.innerHTML = output.innerHTML
        .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--text)">$1</strong>')
        .replace(/\n/g, '<br>');
      await new Promise(r => setTimeout(r, 18));
    }
  }

  function saveNotion(btn) {
    const oldText = btn.textContent;
    btn.textContent = '✅ Configuration sauvegardée !';
    setTimeout(() => btn.textContent = oldText, 2000);
  }
</script>
